name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        py-version:
          - '3.11'
          - '3.14'
    name: Python ${{ matrix.py-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Python ${{ matrix.py-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py-version }}
          architecture: x64

      - name: Install Spectral
        run: |
          pip install .

      - name: Run tests
        run: |
          pytest tests
